{{- if and .Values.rbac.create .Values.rbac.clusterWide -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "miku.fullname" . }}
  labels:
    {{- include "miku.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "miku.fullname" . }}
  labels:
    {{- include "miku.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "miku.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "miku.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "miku.fullname" . }}
  labels:
    {{- include "miku.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "miku.fullname" . }}
  labels:
    {{- include "miku.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "miku.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "miku.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
