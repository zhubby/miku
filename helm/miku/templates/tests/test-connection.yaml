apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "miku.fullname" . }}-test-connection"
  labels:
    {{- include "miku.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command:
        - wget
      args:
        - -qO-
        - http://{{ include "miku.fullname" . }}:{{ .Values.service.port }}/health
  restartPolicy: Never
